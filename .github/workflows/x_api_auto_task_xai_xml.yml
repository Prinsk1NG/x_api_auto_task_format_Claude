name: Silicon Valley Daily Report (v10.2)

on:
  # 每天定时执行 (UTC时间 00:00，对应北京时间早上 08:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 允许在 GitHub Actions 页面手动点击运行，并支持传入测试参数
  workflow_dispatch:
    inputs:
      test_mode:
        description: '开启测试模式 (快速验证功能)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # 安装所需依赖 (由于目前完全走API，playwright其实可以不装，但保留不影响运行)
          pip install requests xai-sdk playwright pynacl
          playwright install chromium
          
      - name: Run Auto Task Script
        env:
          # 🚨 1. 核心推特抓取密钥 (TwitterAPI.io)
          twitterapi_io_KEY: ${{ secrets.twitterapi_io_KEY }}
          
          # 🚨 2. 外部情报源 API Keys (Perplexity & Tavily轮换池)
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY_2: ${{ secrets.TAVILY_API_KEY_2 }}
          TAVILY_API_KEY_3: ${{ secrets.TAVILY_API_KEY_3 }}
          TAVILY_API_KEY_4: ${{ secrets.TAVILY_API_KEY_4 }}
          TAVILY_API_KEY_5: ${{ secrets.TAVILY_API_KEY_5 }}

          # 🚨 3. 大模型与图床 API Keys
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          
          # 🚨 4. 推送 Webhooks
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          
          # 控制参数
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode }}
          
        run: |
          # 确保这里执行的文件名与你仓库里的 Python 主程序文件名完全一致！
          python x_api_auto_task_xai_xml.py

      - name: Upload Data Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-data
          path: data/
          retention-days: 30
