name: 硅谷情报局自动任务 (V13 终极完全体)

on:
  # schedule:
  #   - cron: '0 1 * * *' # 每天北京时间早上 9 点运行
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 开启测试模式 (仅发测试群)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests xai-sdk
          
      - name: 4. 执行核心抓取、Grok分析与分发推送
        env:
          twitterapi_io_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}                   # 🚨 确保这里配置了 Grok 的 API Key
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}     # 飞书测试群
       #   FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }} # 飞书主群
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}     # 微信群
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}
        run: python x_api_auto_task_xai_xml.py

      - name: 5. 自动保存原始快照与 JSON 记忆账本
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 🚨 确保提交文本名单、推送报告以及 data/ 目录下的所有记忆库 JSON
          git add whales.txt experts.txt clean_feed_for_llm.txt data/ || true
          
          git commit -m "🤖 [Daily Intelligence] Archive reports & Tiered Memory Bank" || echo "No changes to commit"
          git push
