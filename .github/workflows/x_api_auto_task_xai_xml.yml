name: Global Chinese Tech & AI Daily (v10.5)

on:
  # 每天定时执行 (UTC时间 00:00，对应北京时间早上 08:00)
  #schedule:
   # - cron: '0 0 * * *'
  
  # 允许在 GitHub Actions 页面手动点击运行，并支持传入测试参数
  workflow_dispatch:
    inputs:
      test_mode:
        description: '开启测试模式 (快速验证功能)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # V10.5 极简高效的 API 架构依赖
          pip install requests xai-sdk
          
      - name: Run Auto Task Script
        env:
          # 🚨 1. 核心推特抓取密钥 (TwitterAPI.io)
          twitterapi_io_KEY: ${{ secrets.twitterapi_io_KEY }}
          
          # 🚨 2. 客观事实情报源 API Key
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          
          # 🚨 3. 全网热点扫描 API Key
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY_2: ${{ secrets.TAVILY_API_KEY_2 }}
          TAVILY_API_KEY_3: ${{ secrets.TAVILY_API_KEY_3 }}
          TAVILY_API_KEY_4: ${{ secrets.TAVILY_API_KEY_4 }}
          TAVILY_API_KEY_5: ${{ secrets.TAVILY_API_KEY_5 }}

          # 🚨 4. 大模型与图床 API Keys
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          
          # 🚨 5. 推送 Webhooks (飞书 + 多端微信)
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }}
          FEISHU_WEBHOOK_URL_2: ${{ secrets.FEISHU_WEBHOOK_URL_2 }}
          FEISHU_WEBHOOK_URL_3: ${{ secrets.FEISHU_WEBHOOK_URL_3 }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          OriCN_WEBHOOK_URL: ${{ secrets.OriCN_WEBHOOK_URL }}
          OriSG_WEBHOOK_URL: ${{ secrets.OriSG_WEBHOOK_URL }}
          
          # 控制参数
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode }}
          
        run: |
          # 确保这里执行的文件名与你仓库里的 Python 主程序文件名完全一致！
          python x_api_auto_task_xai_xml.py

      # 🚨 新增：执行完任务后，强制让云端机器把数据写入并保存到你的 GitHub 仓库中
      - name: Commit and Push Daily Stats
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/account_stats.json || true
          git commit -m "Auto-save daily account stats" || echo "No changes to commit"
          git push

      - name: Upload Data Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-data
          path: data/
          retention-days: 30
