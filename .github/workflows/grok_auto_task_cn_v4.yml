name: Silicon Valley Daily Report (xAI v7)

on:
  # 每天定时执行 (UTC时间 00:00，对应北京时间早上 08:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 允许在 GitHub Actions 页面手动点击运行，支持传参
  workflow_dispatch:
    inputs:
      test_mode:
        description: '开启测试模式 (只扫前 10 人，省 API 额度)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        # 🚀 史诗级减负：移除了 playwright，只需 requests
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Auto Task Script
        env:
          # 核心 API Keys
          xAI_API_KEY: ${{ secrets.xAI_API_KEY }}
          TWTAPI_KEY: ${{ secrets.TWTAPI_KEY }}
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          
          # 推送 Webhooks
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          
          # 接收面板传来的测试开关
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode }}
          
        run: |
          # 请确保此处文件名与你仓库中的 Python 文件名完全一致
          python x_api_auto_task_xai_xml.py

      # 将生成的 data/ 文件夹打包存档，方便复盘数据
      - name: Upload Data Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-data
          path: data/
          retention-days: 7
