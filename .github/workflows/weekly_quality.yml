name: 硅谷情报局周质量自检 (每周一)

on:
  schedule:
    - cron: '0 1 * * 1'   # 每周一北京时间 09:00（daily 07:00 跑完后 2 小时）
  workflow_dispatch:

permissions:
  contents: read   # 只读，不用 push

jobs:
  quality-audit:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码 (含 data 历史报告)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖
        run: pip install requests

      - name: 4. 执行周质量自检
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }}
        run: python weekly_quality.py
