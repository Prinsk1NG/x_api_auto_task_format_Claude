name: 硅谷情报局半月度名单维护 (1号/15号)

on:
  # 定时触发：每个月的 1号 和 15号 的北京时间上午 10:00 (避开早高峰抓取)
  schedule:
    - cron: '0 2 1,15 * *'
  
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 开启测试模式'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  maintain-list:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取最新代码 (包含 data 目录历史记录)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安装依赖
        run: pip install requests
          
      - name: 4. 运行 HR Manager (半月度洗牌算法)
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}     
          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }} 
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}     
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}
        run: |
          # 🚨 这里已经为你修改为新的文件名
          python hr_manager.py

      - name: 5. 自动提交新名单
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 🚨 仅提交可能被 HR 修改的 experts.txt
          git add experts.txt || true
          
          git commit -m "🤖 [HR Manager] Portfolio Rebalancing: Automatically update experts list" || echo "No changes to commit"
          git push
